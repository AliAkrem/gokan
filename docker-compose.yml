services:
  mongodb:
    image: mongo:7
    container_name: gokan-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: gokan_user
      MONGO_INITDB_ROOT_PASSWORD: gokan_pass
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: gokan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  mongo_data:
  redis_data:
